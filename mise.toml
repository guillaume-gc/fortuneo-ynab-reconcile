[tools]
python = "3.14"
uv = "latest"

[tasks.start]
description = "Run the reconciliation CLI"
usage = '''
flag "-f --fortuneo <path>" help="Path to Fortuneo text file"
flag "-y --ynab <path>" help="Path to YNAB CSV export"
'''
run = "uv run python main.py -f ${usage_fortuneo?} -y ${usage_ynab?}"

[tasks.test]
description = "Run unit tests"
run = "uv run pytest"
